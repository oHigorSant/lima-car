  <style>/* ============ LIMA CAR — Landing Page ============ */
:root {
  --orange: #f6811d;
  --orange-bright: #ff8f2a;
  --orange-dark: #d96a0a;
  --black: #0a0a0a;
  --black-2: #141414;
  --black-3: #1c1c1c;
  --line: #2a2a2a;
  --silver: #c4c4c4;
  --silver-dim: #8a8a8a;
  --silver-faint: #5a5a5a;
  --cream: #f5f3ef;
  --white: #ffffff;
  --success: #22c55e;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; overflow-x: hidden; }
body {
  font-family: "Satoshi", "Manrope", system-ui, sans-serif;
  background: var(--black);
  color: var(--cream);
  font-size: 16px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
  max-width: 100vw;
}

img { display: block; max-width: 100%; }
button { font: inherit; cursor: pointer; border: 0; background: none; color: inherit; }
a { color: inherit; text-decoration: none; }
input, select, textarea { font: inherit; color: inherit; }

/* ============ TYPOGRAPHY ============ */
.eyebrow {
  font-family: "JetBrains Mono", monospace;
  font-size: 12px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--orange);
  font-weight: 600;
}
.eyebrow-line {
  display: inline-flex;
  align-items: center;
  gap: 12px;
}
.eyebrow-line::before {
  content: "";
  width: 32px;
  height: 1px;
  background: var(--orange);
}

h1, h2, h3, h4 {
  font-family: "Satoshi", system-ui, sans-serif;
  font-weight: 700;
  letter-spacing: -0.025em;
  line-height: 1.05;
  color: var(--cream);
}
h1 { font-size: clamp(40px, 4.6vw, 64px); letter-spacing: -0.03em; line-height: 1.05; }
h2 { font-size: clamp(32px, 3.6vw, 56px); letter-spacing: -0.025em; line-height: 1.05; }
h3 { font-size: clamp(20px, 1.8vw, 26px); font-weight: 700; letter-spacing: -0.015em; line-height: 1.15; }
h4 { font-weight: 700; line-height: 1.2; letter-spacing: -0.01em; }

p { color: #888888; font-size: 15px; }
.lead { font-size: 16px; color: #b8b6b1; line-height: 1.65; max-width: 540px; }

/* ============ CONTAINERS ============ */
.wrap { max-width: 1280px; margin: 0 auto; padding: 0 28px; }
.wrap-narrow { max-width: 980px; margin: 0 auto; padding: 0 28px; }

section { position: relative; padding: 96px 0; }
@media (min-width: 880px) { section { padding: 128px 0; } }
section.tight { padding: 60px 0; }

/* ============ NAV ============ */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 50;
  padding: 14px 28px;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(10,10,10,0.72);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.nav-logo { display: flex; align-items: center; gap: 12px; }
.nav-logo img { width: 44px; height: 44px; border-radius: 8px; }
.nav-logo-text { line-height: 1; }
.nav-logo-text .a { font-family: "Satoshi", sans-serif; font-weight: 900; font-size: 19px; letter-spacing: -0.03em; }
.nav-logo-text .a .o { color: var(--orange); }
.nav-logo-text .b { font-family: "JetBrains Mono", monospace; font-size: 9px; letter-spacing: 0.22em; color: var(--silver-dim); margin-top: 3px; text-transform: uppercase; }
.nav-links { display: flex; gap: 32px; }
.nav-links a { font-size: 14px; color: var(--silver); letter-spacing: 0.02em; transition: color .15s; }
.nav-links a:hover { color: var(--orange); }
.nav-cta { background: var(--orange); color: var(--black); padding: 12px 20px; border-radius: 8px; font-weight: 700; font-size: 14px; letter-spacing: -0.005em; transition: background .15s, transform .15s; display: inline-flex; align-items: center; gap: 6px; font-family: "Satoshi", sans-serif; white-space: nowrap; }
.nav-cta:hover { background: var(--orange-bright); transform: translateY(-1px); }
@media (max-width: 880px) {
  .nav-links { display: none; }
}

/* ============ BUTTONS ============ */
.btn {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 20px 38px;
  font-family: "Satoshi", sans-serif;
  font-weight: 700;
  font-size: 17px;
  letter-spacing: -0.005em;
  border-radius: 10px;
  transition: transform .15s, background .15s, box-shadow .15s;
  cursor: pointer;
  white-space: nowrap;
}
.btn-primary {
  background: var(--orange);
  color: var(--black);
  box-shadow: 0 8px 28px -10px rgba(246,129,29,0.55);
}
.btn-primary:hover { background: var(--orange-bright); transform: translateY(-2px); box-shadow: 0 14px 36px -10px rgba(246,129,29,0.75); }
.btn-ghost {
  background: transparent;
  color: var(--cream);
  border: 1px solid var(--line);
}
.btn-ghost:hover { border-color: var(--orange); color: var(--orange); }
.btn .arrow { width: 16px; height: 16px; transition: transform .15s; }
.btn:hover .arrow { transform: translateX(3px); }
.btn-block { width: 100%; justify-content: center; }

/* ============ HERO ============ */
.hero {
  min-height: 100vh;
  padding: 72px 0 80px;
  display: flex;
  align-items: center;
  position: relative;
  overflow: hidden;
  background:
    radial-gradient(900px 600px at 78% 35%, rgba(246,129,29,0.13), transparent 60%),
    linear-gradient(180deg, #0a0a0a 0%, #060606 100%);
}
.hero-grid {
  display: grid;
  grid-template-columns: 1.05fr 0.95fr;
  gap: 70px;
  align-items: center;
}
.hero-tag {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 7px 14px;
  border: 1px solid var(--line);
  border-radius: 100px;
  font-family: "JetBrains Mono", monospace;
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--silver);
  margin-bottom: 26px;
}
.hero-tag .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); box-shadow: 0 0 12px var(--success); animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .45; } }

.hero h1 .accent { color: var(--orange); }
.hero h1 .strike { position: relative; display: inline-block; }
.hero h1 .strike::after {
  content: ""; position: absolute; left: -4%; right: -4%; top: 50%; height: 10px;
  background: var(--orange);
  transform: rotate(-1.5deg);
  z-index: -1;
  opacity: 0.9;
}
.hero-sub { margin-top: 28px; font-size: 18px; max-width: 540px; color: #c8c6c1; }

.hero-ctas { display: flex; gap: 14px; margin-top: 36px; flex-wrap: wrap; }
@media (max-width: 880px) {
  .hero-ctas { flex-direction: column; align-items: stretch; }
  .hero-ctas .btn { width: 100%; justify-content: center; }
}

.hero-trust {
  margin-top: 44px;
  padding-top: 28px;
  border-top: 1px solid var(--line);
  display: flex; align-items: center; gap: 18px;
}
.avatars { display: flex; }
.avatars .avatar {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: linear-gradient(135deg, #333, #555);
  border: 2px solid var(--black);
  margin-left: -10px;
  display: flex; align-items: center; justify-content: center;
  color: var(--cream); font-weight: 900; font-size: 13px;
  font-family: "Satoshi", sans-serif;
  letter-spacing: -0.02em;
}
.avatars .avatar:first-child { margin-left: 0; }
.avatars .avatar.a1 { background: linear-gradient(135deg, #2a2a2a, #444); }
.avatars .avatar.a2 { background: linear-gradient(135deg, #3d3d3d, #595959); }
.avatars .avatar.a3 { background: linear-gradient(135deg, #4a4a4a, #666); }
.avatars .avatar.a4 { background: var(--orange); color: var(--black); }
.hero-trust-text { font-size: 14px; color: var(--silver); line-height: 1.35; }
.hero-trust-text strong { color: var(--cream); font-weight: 700; }
.hero-trust-text .stars { color: var(--orange); letter-spacing: 1px; font-size: 13px; }

/* Hero visual */
.hero-visual {
  position: relative;
  aspect-ratio: 4/5;
  border-radius: 8px;
  overflow: hidden;
  background: linear-gradient(135deg, #1a1a1a, #0a0a0a);
  border: 1px solid var(--line);
}
.hero-stat { z-index: 2; }
.placeholder-img {
  width: 100%; height: 100%;
  background:
    repeating-linear-gradient(
      135deg,
      transparent 0,
      transparent 14px,
      rgba(246,129,29,0.05) 14px,
      rgba(246,129,29,0.05) 15px
    ),
    linear-gradient(135deg, #1c1c1c 0%, #0a0a0a 100%);
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.placeholder-img .label {
  font-family: "JetBrains Mono", monospace;
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--silver-faint);
  border: 1px dashed var(--silver-faint);
  padding: 8px 14px;
  border-radius: 3px;
}

.hero-stat {
  position: absolute;
  background: var(--orange);
  color: var(--black);
  padding: 18px 22px;
  border-radius: 6px;
  box-shadow: 0 24px 60px -20px rgba(0,0,0,0.8);
}
.hero-stat .n { font-family: "Satoshi", sans-serif; font-size: 32px; font-weight: 700; line-height: 1; letter-spacing: -0.025em; }
.hero-stat .l { font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 700; }
.hero-stat-1 { top: 24px; left: -24px; }
.hero-stat-2 { bottom: 24px; right: -24px; background: var(--black); color: var(--cream); border: 1px solid var(--line); }
.hero-stat-2 .n { color: var(--orange); }
.hero-stat-2 .l { color: var(--silver); }

@media (max-width: 880px) {
  .hero { padding: 48px 0 60px; }
  .hero-grid { grid-template-columns: 1fr; gap: 48px; }
  .hero-visual { max-width: 480px; margin: 0 auto; overflow: visible; }
  .hero-visual img { transform: scale(0.82); transform-origin: center; border-radius: 8px; }
  .hero-stat { padding: 10px 14px; }
  .hero-stat .n { font-size: 20px; }
  .hero-stat .l { font-size: 8px; letter-spacing: 0.12em; }
  .hero-stat-1 { top: -8px; left: -8px; }
  .hero-stat-2 { bottom: -8px; right: -8px; }
}

/* ============ STATS STRIP ============ */
.stats-strip {
  background: var(--black);
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  padding: 64px 0;
}
.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 32px;
}
.stat-cell {
  display: flex; flex-direction: column;
  position: relative;
  padding-left: 24px;
}
.stat-cell::before {
  content: "";
  position: absolute;
  left: 0; top: 8px; bottom: 8px;
  width: 2px;
  background: var(--orange);
}
.stat-cell .num {
  font-family: "Satoshi", sans-serif;
  font-weight: 700;
  font-size: clamp(40px, 4.6vw, 64px);
  line-height: 0.95;
  letter-spacing: -0.035em;
  color: var(--cream);
  font-feature-settings: "tnum" 1;
}
.stat-cell .num .unit { color: var(--orange); }
.stat-cell .lbl {
  font-family: "JetBrains Mono", monospace;
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--silver-dim);
  margin-top: 14px;
  font-weight: 600;
}
@media (max-width: 880px) {
  .stats-grid { grid-template-columns: 1fr 1fr; gap: 28px 24px; }
  .stats-strip { padding: 48px 0; }
}

/* ============ SECTION HEADERS ============ */
.section-head { margin-bottom: 56px; max-width: 760px; }
.section-head h2 .accent { color: var(--orange); }
.section-head p { margin-top: 18px; color: #888; max-width: 620px; }

/* generic accent inside headings */
h1 .accent, h2 .accent, h3 .accent, h4 .accent { color: var(--orange); }
h2 .strike { position: relative; display: inline-block; }
h2 .strike::after {
  content: ""; position: absolute; left: -2%; right: -2%; top: 50%; height: 6px;
  background: var(--orange);
  transform: rotate(-1.5deg);
  z-index: -1;
  opacity: 0.85;
}
.center { text-align: center; margin-left: auto; margin-right: auto; }
.center .eyebrow-line { justify-content: center; }

/* ============ PROBLEM SECTION ============ */
.problem {
  background: var(--black);
  border-top: 1px solid var(--line);
}
.problem-grid {
  display: grid;
  grid-template-columns: 1fr 1.1fr;
  gap: 64px;
  align-items: center;
}
.problem-visual {
  aspect-ratio: 1/1;
  border-radius: 8px;
  border: 1px solid var(--line);
  position: relative;
  overflow: hidden;
  box-shadow: 0 8px 32px -8px rgba(246,129,29,0.18);
}
.problem-visual::after {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.65) 100%);
  pointer-events: none;
}
.problem h2 .strike { text-decoration: none; }
.problem-list { margin-top: 40px; display: flex; flex-direction: column; gap: 18px; }
.problem-list .row {
  display: flex; gap: 16px; align-items: flex-start;
  padding: 18px 0;
  border-bottom: 1px solid var(--line);
}
.problem-list .row:last-child { border-bottom: 0; }
.problem-list .icon { flex-shrink: 0; width: 32px; height: 32px; border-radius: 6px; background: rgba(246,129,29,0.12); color: var(--orange); display: flex; align-items: center; justify-content: center; }
.problem-list .row strong { color: var(--cream); font-weight: 600; }
.problem-list .row span { color: var(--silver); font-size: 15px; display: block; margin-top: 2px; }

@media (max-width: 880px) {
  .problem-grid { grid-template-columns: 1fr; gap: 40px; }
}

/* ============ BENEFITS ============ */
.benefits { background: linear-gradient(180deg, #060606 0%, #0a0a0a 100%); border-top: 1px solid var(--line); }
.benefit-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-top: 56px; }
.benefit-card {
  background: var(--black-2);
  border: 1px solid var(--line);
  border-radius: 16px;
  overflow: hidden;
  transition: transform .25s, box-shadow .25s;
  box-shadow: 0 8px 32px -8px rgba(246,129,29,0.18);
}
.benefit-card:hover { transform: translateY(-4px); box-shadow: 0 16px 48px -8px rgba(246,129,29,0.32); }
.benefit-img { aspect-ratio: 4/3; border-bottom: 1px solid var(--line); }
.benefit-body { padding: 26px; }
.benefit-num {
  font-family: "JetBrains Mono", monospace;
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--orange);
  margin-bottom: 14px;
  font-weight: 600;
}
.benefit-card h3 { font-size: clamp(20px, 1.8vw, 24px); margin-bottom: 12px; letter-spacing: -0.02em; line-height: 1.15; font-weight: 700; }
.benefit-card p { color: #888; font-size: 14px; line-height: 1.6; }

@media (max-width: 880px) {
  .benefit-grid { grid-template-columns: 1fr; }
}

/* ============ ABOUT BAND ============ */
.about-band {
  background: var(--black);
  border-top: 1px solid var(--line);
  padding: 90px 0;
}
.about-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 64px;
  align-items: center;
}
.about-grid h2 { font-size: clamp(32px, 3.8vw, 60px); }
.about-grid p { font-size: 18px; color: #d2d0cb; }
.about-marks { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; margin-top: 32px; }
.about-mark { display: flex; gap: 12px; align-items: flex-start; }
.about-mark .check { flex-shrink: 0; width: 24px; height: 24px; border-radius: 50%; background: var(--orange); color: var(--black); display: flex; align-items: center; justify-content: center; font-weight: 800; }
.about-mark span { font-size: 15px; color: var(--cream); line-height: 1.35; }

@media (max-width: 880px) {
  .about-grid { grid-template-columns: 1fr; gap: 36px; }
}

/* ============ ALERT ============ */
.alert-section { background: var(--black); }
.alert-card {
  background: var(--orange);
  color: var(--black);
  padding: 48px 56px;
  border-radius: 16px;
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 36px;
  align-items: center;
  position: relative;
  overflow: hidden;
}
.alert-card::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    repeating-linear-gradient(
      135deg,
      transparent 0 20px,
      rgba(0,0,0,0.04) 20px 21px
    );
  pointer-events: none;
}
.alert-icon { width: 78px; height: 78px; border-radius: 50%; background: var(--black); color: var(--orange); display: flex; align-items: center; justify-content: center; position: relative; z-index: 1; }
.alert-text { position: relative; z-index: 1; }
.alert-text .label { font-family: "JetBrains Mono", monospace; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 700; margin-bottom: 10px; }
.alert-text h3 { font-size: clamp(20px, 2vw, 28px); color: var(--black); letter-spacing: -0.02em; line-height: 1.2; font-weight: 700; }
.alert-card .btn-primary { background: var(--black); color: var(--orange); position: relative; z-index: 1; }
.alert-card .btn-primary:hover { background: #1a1a1a; box-shadow: 0 14px 36px -10px rgba(0,0,0,0.5); }

@media (max-width: 880px) {
  .alert-card { grid-template-columns: 1fr; padding: 36px 28px; gap: 22px; text-align: left; }
}

/* ============ FORM ============ */
.form-section {
  background: linear-gradient(180deg, #0a0a0a 0%, #050505 100%);
  border-top: 1px solid var(--line);
}
.form-wrap {
  display: grid;
  grid-template-columns: 1fr 1.05fr;
  gap: 64px;
  align-items: start;
}
.form-side h2 .accent { color: var(--orange); }
.form-side .lead { margin-top: 20px; }
.form-side .whatsapp-card {
  margin-top: 36px;
  background: var(--black-2);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 24px;
  display: flex;
  gap: 18px;
  align-items: center;
}
.whatsapp-icon {
  width: 56px; height: 56px;
  background: #25D366;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.whatsapp-card .label { font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--silver-dim); margin-bottom: 4px; }
.whatsapp-card .num { font-family: "Satoshi", sans-serif; font-size: 22px; font-weight: 700; letter-spacing: -0.015em; color: var(--cream); }

.form-card {
  background: var(--black-2);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 36px;
}
.form-card h3 { font-size: clamp(22px, 1.8vw, 26px); margin-bottom: 8px; letter-spacing: -0.02em; font-weight: 700; }
.form-card .sub { font-size: 14px; color: #888; margin-bottom: 28px; }
.field { margin-bottom: 18px; }
.field label {
  display: block;
  font-family: "Satoshi", sans-serif;
  font-size: 14px;
  letter-spacing: 0.02em;
  text-transform: none;
  color: var(--silver);
  margin-bottom: 8px;
  font-weight: 600;
}
.field input, .field select, .field textarea {
  width: 100%;
  background: var(--black);
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 16px 18px;
  font-size: 16px;
  color: var(--cream);
  transition: border-color .15s;
}
.field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--orange); }
.field input::placeholder { color: var(--silver-faint); }
.urgency-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.urgency-btn {
  padding: 14px 8px;
  background: var(--black);
  border: 1px solid var(--line);
  border-radius: 6px;
  font-size: 15px;
  font-weight: 600;
  color: var(--silver);
  text-align: center;
  cursor: pointer;
  transition: all .15s;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.urgency-btn:hover { border-color: var(--silver); color: var(--cream); }
.urgency-btn.active { background: var(--orange); color: var(--black); border-color: var(--orange); }

.form-success {
  text-align: center; padding: 30px 10px;
}
.form-success .check-big { width: 64px; height: 64px; border-radius: 50%; background: var(--success); color: white; display: flex; align-items: center; justify-content: center; margin: 0 auto 18px; }
.form-success h4 { font-family: "Satoshi", sans-serif; font-size: 24px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 8px; }
.form-success p { color: var(--silver); }

@media (max-width: 880px) {
  .form-wrap { grid-template-columns: 1fr; gap: 36px; }
  .form-card { padding: 24px 18px; }
  .form-section { padding: 60px 0; }
  .urgency-grid { gap: 6px; }
  .urgency-btn { font-size: 13px; padding: 12px 4px; }
}

/* ============ TESTIMONIALS ============ */
.testimonials { background: var(--black); border-top: 1px solid var(--line); }
.testimonial-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-top: 56px; }
.testimonial-card {
  background: var(--black-2);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 32px;
  position: relative;
  display: flex; flex-direction: column;
}
.testimonial-tag {
  display: inline-block;
  font-family: "JetBrains Mono", monospace;
  font-size: 10px;
  letter-spacing: 0.22em;
  color: var(--orange);
  text-transform: uppercase;
  margin-bottom: 22px;
  font-weight: 600;
}
.stars-row { color: var(--orange); margin-bottom: 18px; letter-spacing: 2px; font-size: 16px; }
.testimonial-card blockquote {
  font-size: 16px;
  line-height: 1.6;
  color: #b8b6b1;
  flex: 1;
  margin-bottom: 28px;
  letter-spacing: -0.005em;
  font-weight: 400;
}
.testimonial-card blockquote::before { content: "\201C"; color: var(--orange); font-size: 56px; line-height: 0; vertical-align: -16px; margin-right: 6px; font-family: "Satoshi", serif; font-weight: 900; }
.testimonial-card .author { display: flex; align-items: center; gap: 12px; padding-top: 20px; border-top: 1px solid var(--line); }
.author-avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #2a2a2a, #444); display: flex; align-items: center; justify-content: center; font-family: "Satoshi", sans-serif; font-weight: 900; color: var(--cream); font-size: 14px; letter-spacing: -0.02em; }
.author-name { font-weight: 700; font-size: 15px; color: var(--cream); }
.author-meta { font-size: 12px; color: var(--silver-dim); font-family: "JetBrains Mono", monospace; }

@media (max-width: 880px) {
  .testimonial-grid { grid-template-columns: 1fr; }
}

/* ============ SERVICES ============ */
.services { background: linear-gradient(180deg, #050505, #0a0a0a); border-top: 1px solid var(--line); }
.service-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 56px; }
.service-item {
  background: linear-gradient(180deg, rgba(246,129,29,0.04) 0%, var(--black-2) 60%);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 32px;
  transition: border-color .2s, transform .2s;
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 22px;
  overflow: hidden;
}
.service-item::before {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(400px 200px at 0% 0%, rgba(246,129,29,0.08), transparent 60%);
  opacity: 0;
  transition: opacity .25s;
  pointer-events: none;
}
.service-item:hover { border-color: rgba(246,129,29,0.4); transform: translateY(-3px); }
.service-item:hover::before { opacity: 1; }
.service-tag {
  display: inline-flex;
  align-items: center;
  padding: 5px 12px;
  background: rgba(246,129,29,0.12);
  border: 1px solid rgba(246,129,29,0.3);
  border-radius: 100px;
  font-family: "JetBrains Mono", monospace;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--orange);
  width: fit-content;
  position: relative;
  z-index: 1;
}
.service-icon { width: 48px; height: 48px; border-radius: 10px; background: rgba(246,129,29,0.12); color: var(--orange); display: flex; align-items: center; justify-content: center; position: relative; z-index: 1; }
.service-content { position: relative; z-index: 1; }
.service-content h4 { font-family: "Satoshi", sans-serif; font-size: clamp(20px, 1.6vw, 24px); font-weight: 700; margin-bottom: 10px; line-height: 1.15; letter-spacing: -0.015em; }
.service-content p { color: #888; font-size: 14px; line-height: 1.6; }
.service-arrow { display: none; }
.service-num { display: none; }

@media (max-width: 880px) {
  .service-grid { grid-template-columns: 1fr; }
  .service-item { padding: 26px; }
}

.services-cta { text-align: center; margin-top: 48px; }

/* ============ GUARANTEE ============ */
.guarantee {
  background: var(--black);
  border-top: 1px solid var(--line);
}
.guarantee-wrap {
  background:
    radial-gradient(600px 400px at 20% 50%, rgba(246,129,29,0.12), transparent 60%),
    var(--black-2);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 64px 56px;
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 56px;
  align-items: center;
}
.shield {
  width: 160px; height: 180px;
  position: relative;
  flex-shrink: 0;
}
.shield svg { width: 100%; height: 100%; filter: drop-shadow(0 12px 32px rgba(246,129,29,0.35)); }
.guarantee-content h2 { font-size: clamp(30px, 3.4vw, 50px); letter-spacing: -0.025em; line-height: 1.05; font-weight: 700; }
.guarantee-content h2 .accent { color: var(--orange); }
.guarantee-content p { margin-top: 18px; font-size: 17px; color: #cfcdc8; max-width: 580px; }

@media (max-width: 880px) {
  .guarantee-wrap { grid-template-columns: 1fr; text-align: center; padding: 48px 28px; }
  .shield { margin: 0 auto; }
}

/* ============ FAQ ============ */
.faq { background: var(--black); border-top: 1px solid var(--line); }
.faq-list { margin-top: 48px; }
.faq-item {
  border-bottom: 1px solid var(--line);
}
.faq-item:first-child { border-top: 1px solid var(--line); }
.faq-q {
  width: 100%;
  text-align: left;
  padding: 26px 0;
  display: flex; align-items: center; justify-content: space-between;
  gap: 24px;
  cursor: pointer;
  transition: color .15s;
}
.faq-q:hover { color: var(--orange); }
.faq-q-text { font-family: "Satoshi", sans-serif; font-size: clamp(18px, 1.6vw, 24px); font-weight: 700; letter-spacing: -0.015em; line-height: 1.25; }
.faq-toggle { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--line); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all .2s; }
.faq-item.open .faq-toggle { background: var(--orange); border-color: var(--orange); color: var(--black); transform: rotate(45deg); }
.faq-a {
  max-height: 0;
  overflow: hidden;
  transition: max-height .35s ease;
}
.faq-item.open .faq-a { max-height: 240px; }
.faq-a-inner { padding-bottom: 26px; max-width: 760px; color: #cfcdc8; line-height: 1.6; }

.faq-cta { text-align: center; margin-top: 60px; }

/* ============ FOOTER ============ */
footer {
  background: var(--black);
  border-top: 1px solid var(--line);
  padding: 80px 0 36px;
}
.footer-grid {
  display: grid;
  grid-template-columns: 1.4fr 1fr 1fr 1fr;
  gap: 56px;
  margin-bottom: 64px;
}
.footer-brand-text { margin-top: 20px; color: var(--silver); font-size: 15px; max-width: 280px; line-height: 1.7; }
.footer-col h5 { font-family: "Satoshi", sans-serif; font-size: 13px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--silver-dim); margin-bottom: 24px; font-weight: 700; }
.footer-col ul { display: flex; flex-direction: column; gap: 4px; }
.footer-col li, .footer-col .row { font-size: 15px; color: var(--cream); padding: 10px 0; list-style: none; display: flex; gap: 12px; align-items: flex-start; border-bottom: 1px solid rgba(255,255,255,0.04); line-height: 1.6; }
.footer-col li:last-child { border-bottom: none; }
.footer-col li.muted, .footer-col .row.muted { color: var(--silver); }
.footer-col svg { flex-shrink: 0; margin-top: 3px; color: var(--orange); }
.footer-bottom {
  padding-top: 28px;
  border-top: 1px solid var(--line);
  display: flex; justify-content: space-between; align-items: center;
  font-size: 13px;
  font-family: "Satoshi", sans-serif;
  letter-spacing: 0.04em;
  color: var(--silver-dim);
}
@media (max-width: 880px) {
  .footer-grid { grid-template-columns: 1fr; gap: 40px; }
  .footer-bottom { flex-direction: column; gap: 12px; }
}

/* ============ FLOATING WHATSAPP ============ */
.float-wa {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 60px; height: 60px;
  background: #25D366;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 12px 36px -8px rgba(37, 211, 102, 0.55);

  transition: transform .15s;
  cursor: pointer;
}

/* ============ DIVIDER ============ */
.diag-divider {
  height: 60px;
  background:
    repeating-linear-gradient(
      135deg,
      var(--orange) 0 20px,
      var(--black) 20px 40px
    );
}
